<!doctype html><html lang="en"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><meta name="description" content="A fullscreen Flux canvas for michaelconnolly.tech."/><meta name="referrer" content="no-referrer"/><title>michaelconnolly.tech</title><style>:root {
        color-scheme: dark;
        --surface-bg: #090807;
        --surface-fg: #d8d1c7;
      }

      * {

      html,
      body {

      }
